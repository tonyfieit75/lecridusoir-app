<!DOCTYPE html>
<html>

<head>

  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Le Cri du Soir - Spiritual Community">

  <!-- iOS meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Le Cri du Soir">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Le Cri du Soir</title>
  <link rel="manifest" href="manifest.json">

  <!-- 🔹 GLOBAL WEB FIX -->
  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow-x: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #loading img {
      width: 120px;
      margin-bottom: 15px;
    }

    #loading h2 {
      margin: 0;
      font-weight: 600;
    }

    #loading p {
      color: #777;
    }
  </style>

</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loading">
    <img src="assets/logo.png">
    <h2>Le Cri du Soir</h2>
    <p>Chargement...</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById("loading");
      if (loading) {
        loading.remove();
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
